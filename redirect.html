<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claim Your Reward</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    .card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 60px 48px;
      text-align: center;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
      max-width: 420px;
      width: 90%;
    }
    .badge {
      display: inline-block;
      background: linear-gradient(90deg, #f7971e, #ffd200);
      color: #1a1a2e;
      font-weight: 700;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      padding: 6px 16px;
      border-radius: 100px;
      margin-bottom: 20px;
    }
    h1 {
      color: #fff;
      font-size: 1.75rem;
      margin-bottom: 12px;
    }
    p {
      color: rgba(255, 255, 255, 0.6);
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .btn {
      position: relative;
      display: inline-block;
      padding: 16px 48px;
      font-size: 1.1rem;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(90deg, #f7971e, #ffd200);
      border: none;
      border-radius: 60px;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 8px 30px rgba(247, 151, 30, 0.35);
      letter-spacing: 0.5px;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(247, 151, 30, 0.5);
    }
    .btn:active {
      transform: translateY(0);
    }
    .disclaimer {
      margin-top: 24px;
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.3);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">Limited Time</div>
    <h1>You've Been Selected!</h1>
    <p>Congratulations! You've been randomly selected for an exclusive VIP reward. Tap the button below to claim your prize instantly.</p>
    <a href="https://omg10.com/4/11270000" target="_blank" rel="noopener noreferrer" class="btn" id="claimBtn">
      Claim Your Reward
    </a>
    <p class="disclaimer">* Only 1 claim per user. Offer expires soon.</p>
  </div>

  <script>
    (function() {
      var btn = document.getElementById('claimBtn');
      btn.addEventListener('click', function(e) {
        window.open('https://omg10.com/4/11270000', '_blank', 'noopener,noreferrer');
      });
      var links = document.querySelectorAll('a[href="https://omg10.com/4/11270000"]');
      for (var i = 0; i < links.length; i++) {
        links[i].addEventListener('click', function(e) {
          e.preventDefault();
          window.open('https://omg10.com/4/11270000', '_blank', 'noopener,noreferrer');
        });
      }
    })();
  </script>
</body>
</html>
